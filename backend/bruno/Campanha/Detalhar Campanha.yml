info:
  name: Detalhar Campanha
  type: http
  seq: 2

http:
  method: get
  url: http://localhost:3000/estudos/:estudo_id/campanhas/:campanha_id
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: estudo_id
      value: "7"
      type: path
    - name: campanha_id
      value: "1"
      type: path
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
