info:
  name: Listar Campanhas
  type: http
  seq: 1

http:
  method: get
  url: http://localhost:3000/estudos/:estudo_id/campanhas
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: estudo_id
      value: "7"
      type: path
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
