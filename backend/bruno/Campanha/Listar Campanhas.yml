info:
  name: Listar Campanhas
  type: http
  seq: 1

http:
  method: get
  url: http://localhost:3000/estudos/:estudo_id/campanhas
  headers:
    - name: Content-Type
      value: application/json
  auth: inherit
  params:
    - name: estudo_id
      value: "1"
      type: path

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
