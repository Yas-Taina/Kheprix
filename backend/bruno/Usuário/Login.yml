info:
  name: Login
  type: http
  seq: 2

http:
  method: post
  url: http://localhost:3000/autenticacao/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "chrisnotads2020@gmail.com",
        "senha": "senha123"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: token
        scope: runtime

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
